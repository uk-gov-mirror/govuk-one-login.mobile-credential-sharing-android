name: Android PR checks

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  packages: read

jobs:
  conventional_commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: 'true'
          submodules: 'true'
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/android-setup
        with:
          install-vale: 'false'
      - name: Verify Conventional commit standards against latest git tag
        run: cog check -l
        shell: bash

  prose_linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: 'true'
          submodules: 'true'
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/android-setup
      - name: Run vale prose linting
        run: ./scripts/lint/vale/run

  gradle_linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: 'true'
          submodules: 'true'
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/android-setup
        with:
          install-vale: 'false'
      - name: Run linting associated with Gradle
        run: |
          ./scripts/lint/gradle

  unit_tests_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: 'true'
          submodules: 'true'
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/android-setup
        with:
          install-vale: 'false'
      - name: Run unit tests
        run: |
          ./scripts/test/unit
      - name: Generate dependency graph report
        uses: gradle/actions/dependency-submission@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          dependency-graph: generate-and-upload
          artifact-retention-days: 1
      - name: Upload unit test coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-coverage
          path: |
            **/build/outputs/unit_test_code_coverage/**/*.exec
            **/build/reports/coverage/test/debug/*.xml

  instrumentation_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: 'true'
          submodules: 'true'
          fetch-depth: 0
      - name: Setup
        uses: ./mobile-android-pipelines/actions/setup-runner
        with:
          gradle-cache-disabled: "false"
          jdk-version: "21"
      - name: Run instrumentation tests
        run: |
          ./scripts/test/instrumentation --no-configuration-cache
      - name: Upload instrumentation test coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: instrumentation-test-coverage
          path: |
            **/build/outputs/managed_device_code_coverage/**/*.ec
            **/build/reports/coverage/androidTest/**/*.xml

  sonar_scan:
    runs-on: ubuntu-latest
    needs: [unit_tests_job, instrumentation_tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: 'true'
          submodules: 'true'
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/android-setup
        with:
          install-vale: 'false'
      - name: Download unit test coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: unit-test-coverage
      - name: Download instrumentation test coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: instrumentation-test-coverage
      - name: Assemble for Sonar scan
        run: |
          ./scripts/compilePackagesForSonar
      - name: Sonar scan
        uses: ./mobile-android-pipelines/actions/sonar-scan
        with:
          sonar-token: ${{ secrets.SONAR_TOKEN }}
